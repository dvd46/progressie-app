<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bronzeFill" cx="38%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#F5D08A"/>
      <stop offset="35%"  stop-color="#CD7F32"/>
      <stop offset="75%"  stop-color="#A85F18"/>
      <stop offset="100%" stop-color="#5C2C00"/>
    </radialGradient>
    <radialGradient id="bronzeGloss" cx="32%" cy="22%" r="48%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="bronzeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Main circle -->
  <circle cx="16" cy="16" r="14.5" fill="url(#bronzeFill)" filter="url(#bronzeShadow)"/>

  <!-- Metallic border -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#8B4A00" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="13.2" fill="none" stroke="rgba(220,150,60,0.5)" stroke-width="0.5"/>

  <!-- Large "3" -->
  <text x="13.5" y="23.5"
        text-anchor="middle"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="17"
        font-weight="900"
        fill="#3D1A00">3</text>

  <!-- "rd" superscript -->
  <text x="22.5" y="15.5"
        text-anchor="middle"
        font-family="'Arial', sans-serif"
        font-size="6.5"
        font-weight="700"
        fill="#4A2000">rd</text>

  <!-- Gloss highlight -->
  <ellipse cx="12.5" cy="10" rx="5.5" ry="3.5" fill="url(#bronzeGloss)"/>
</svg>
