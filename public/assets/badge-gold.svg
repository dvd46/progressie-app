<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="goldFill" cx="38%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#FFFDE7"/>
      <stop offset="35%"  stop-color="#FFD700"/>
      <stop offset="75%"  stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#8B6000"/>
    </radialGradient>
    <radialGradient id="goldGloss" cx="32%" cy="22%" r="48%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Main circle -->
  <circle cx="16" cy="16" r="14.5" fill="url(#goldFill)" filter="url(#goldShadow)"/>

  <!-- Metallic border -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#A07000" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="13.2" fill="none" stroke="rgba(255,220,60,0.5)" stroke-width="0.5"/>

  <!-- Crown shape -->
  <path d="M9,18.5 L9.5,13 L12.5,15.8 L16,9.5 L19.5,15.8 L22.5,13 L23,18.5 Z"
        fill="#7A4F00" opacity="0.82"/>
  <!-- Crown base line -->
  <rect x="9" y="18" width="14" height="1.5" rx="0.5" fill="#7A4F00" opacity="0.82"/>

  <!-- PR text -->
  <text x="16" y="27"
        text-anchor="middle"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="9.5"
        font-weight="900"
        fill="#3D2200"
        letter-spacing="0.8">PR</text>

  <!-- Gloss highlight -->
  <ellipse cx="12.5" cy="10" rx="5.5" ry="3.5" fill="url(#goldGloss)"/>
</svg>
